<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" role="img" aria-label="宅建士の判断を支える設計 を表すイラスト">
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EFF6FF"/><stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="brand02" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E3A8A"/><stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" rx="20" fill="url(#bg02)"/>
  <!-- document -->
  <g transform="translate(74,46)">
    <rect width="170" height="200" rx="12" fill="#fff" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="20" y="28" width="120" height="10" rx="5" fill="#E2E8F0"/>
    <rect x="20" y="50" width="100" height="8" rx="4" fill="#EEF2F7"/>
    <rect x="20" y="68" width="130" height="8" rx="4" fill="#EEF2F7"/>
    <rect x="20" y="86" width="86" height="8" rx="4" fill="#EEF2F7"/>
    <!-- check stamp -->
    <circle cx="120" cy="148" r="32" fill="none" stroke="#10B981" stroke-width="4"/>
    <path d="M104 150 l12 12 l24 -28" fill="none" stroke="#10B981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- AI assist bubble -->
  <g transform="translate(252,52)">
    <rect width="116" height="56" rx="14" fill="url(#brand02)"/>
    <path d="M20 50 l-10 10 v-12 z" fill="url(#brand02)"/>
    <g transform="translate(16,16)" fill="#fff">
      <path d="M14 0 L17 8 L25 11 L17 14 L14 22 L11 14 L3 11 L11 8 Z"/>
    </g>
    <text x="48" y="32" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#fff">AI が補助</text>
  </g>
  <!-- arrow connecting bubble to doc -->
  <path d="M260 100 Q230 130 230 150" fill="none" stroke="#94A3B8" stroke-width="2.5" stroke-dasharray="4 5" stroke-linecap="round"/>
  <!-- final stamp by takken -->
  <g transform="translate(248,180)">
    <rect width="120" height="54" rx="10" fill="#fff" stroke="#CBD5E1"/>
    <circle cx="22" cy="27" r="11" fill="#10B981"/>
    <path d="M16 28 l5 5 l9 -10" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="22" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="11" font-weight="700" fill="#475569">最終確認</text>
    <text x="40" y="38" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="13" font-weight="800" fill="#0F172A">宅建士</text>
  </g>
</svg>
