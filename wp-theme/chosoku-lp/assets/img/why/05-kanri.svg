<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" role="img" aria-label="kanriとの完全統合 を表すイラスト">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EFF6FF"/><stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="brandA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E3A8A"/><stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="brandB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0EA5E9"/><stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" rx="20" fill="url(#bg05)"/>

  <!-- left app: kanri -->
  <g transform="translate(36,60)">
    <rect width="138" height="160" rx="14" fill="#fff" stroke="#CBD5E1" stroke-width="2"/>
    <rect width="138" height="32" rx="14" fill="url(#brandA)"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#fff">kanri</text>
    <text x="118" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#BAE6FD" text-anchor="end">管理</text>
    <g transform="translate(14,46)">
      <rect width="110" height="18" rx="4" fill="#EFF6FF"/>
      <rect y="24" width="92" height="14" rx="3" fill="#E2E8F0"/>
      <rect y="46" width="110" height="40" rx="6" fill="#F8FAFC" stroke="#E2E8F0"/>
      <rect x="6" y="52" width="58" height="6" rx="3" fill="#CBD5E1"/>
      <rect x="6" y="64" width="74" height="6" rx="3" fill="#E2E8F0"/>
      <rect x="6" y="74" width="42" height="6" rx="3" fill="#E2E8F0"/>
    </g>
  </g>

  <!-- right app: 調速 -->
  <g transform="translate(226,60)">
    <rect width="138" height="160" rx="14" fill="#fff" stroke="#CBD5E1" stroke-width="2"/>
    <rect width="138" height="32" rx="14" fill="url(#brandB)"/>
    <text x="14" y="22" font-family="'Noto Sans JP', sans-serif" font-size="13" font-weight="800" fill="#fff">調速</text>
    <text x="118" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#E0F2FE" text-anchor="end">調査</text>
    <g transform="translate(14,46)">
      <rect width="110" height="18" rx="4" fill="#E0F2FE"/>
      <g transform="translate(0,28)">
        <rect width="52" height="34" rx="5" fill="#EFF6FF" stroke="#BFDBFE"/>
        <rect x="58" width="52" height="34" rx="5" fill="#EFF6FF" stroke="#BFDBFE"/>
        <rect y="40" width="52" height="34" rx="5" fill="#ECFDF5" stroke="#A7F3D0"/>
        <rect x="58" y="40" width="52" height="34" rx="5" fill="#FFF7ED" stroke="#FED7AA"/>
      </g>
    </g>
  </g>

  <!-- linking SSO arc -->
  <path d="M180 140 C 200 100, 200 100, 220 140" fill="none" stroke="#1E3A8A" stroke-width="3" stroke-linecap="round"/>
  <circle cx="200" cy="108" r="20" fill="#fff" stroke="#1E3A8A" stroke-width="2.5"/>
  <path d="M192 108 a 8 8 0 1 1 16 0 a 8 8 0 1 1 -16 0" fill="#1E3A8A"/>
  <path d="M188 122 q 12 -10 24 0" fill="none" stroke="#1E3A8A" stroke-width="2.5" stroke-linecap="round"/>
  <text x="200" y="158" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="700" fill="#1E3A8A">1アカウント</text>
</svg>
